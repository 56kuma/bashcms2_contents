# 記事が push されたら cms_2026 のジェネレータでビルドして Cloudflare Pages へ公開する
name: Deploy blog

on:
  push:
    branches: [master]
  workflow_dispatch: # GitHub の Actions タブから手動実行も可能

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # ローカルと同じフォルダ配置を再現する:
      #   ./bashcms2_contents (記事)  ./cms_2026 (ジェネレータ)
      - name: Checkout articles
        uses: actions/checkout@v4
        with:
          path: bashcms2_contents

      - name: Checkout site generator
        uses: actions/checkout@v4
        with:
          repository: 56kuma/cms_2026
          path: cms_2026

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build site
        working-directory: cms_2026
        run: |
          npm ci
          node build.mjs

      - name: Deploy to Cloudflare Pages
        working-directory: cms_2026
        run: npx wrangler pages deploy public --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
